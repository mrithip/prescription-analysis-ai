version: '3.8'

services:
  medscan-ai:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=main.py
    volumes:
      - ./templates:/app/templates
      - ./main.py:/app/main.py
      - ./models:/app/models
    networks:
      - medscan-network

networks:
  medscan-network:
    driver: bridge
