version: '3.8'

services:
  medscan-ai:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=main.py
    volumes:
      - ./templates:/app/templates
      - ./main.py:/app/main.py
    depends_on:
      - lm-studio
    networks:
      - medscan-network

  lm-studio:
    image: lmstudio:latest
    ports:
      - "1234:1234"
    volumes:
      - lm-studio-data:/app/data
    networks:
      - medscan-network

volumes:
  lm-studio-data:

networks:
  medscan-network:
    driver: bridge
