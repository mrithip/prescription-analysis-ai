<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedScan AI | Clinical Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        #analysis-content h3 { font-weight: 700; font-size: 1.25rem; color: #1e3a8a; margin-top: 1.5rem; margin-bottom: 0.75rem; border-left: 4px solid #2563eb; padding-left: 12px; }
        #analysis-content p { margin-bottom: 1rem; color: #334155; line-height: 1.6; }
        #analysis-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; color: #475569; }
        #analysis-content li { margin-bottom: 0.5rem; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-6xl mx-auto py-12 px-6">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-black text-slate-900">MedScan<span class="text-blue-600">AI</span></h1>
                <p class="text-slate-500 font-medium">Professional Medication Intelligence</p>
            </div>
            <button onclick="window.location.reload()" class="bg-white border border-slate-200 px-6 py-3 rounded-2xl shadow-sm hover:bg-slate-50 font-bold text-slate-700">
                New Analysis
            </button>
        </header>

        <div id="drop-zone" class="bg-white border-2 border-dashed border-slate-300 rounded-[2rem] p-24 text-center hover:border-blue-500 hover:bg-blue-50/50 transition-all cursor-pointer shadow-sm">
            <p class="text-2xl font-bold text-slate-800">Upload Prescription Scan</p>
            <p class="text-slate-400 mt-2 font-medium text-lg">Click to browse or Drag & Drop</p>
            <input type="file" id="file-input" class="hidden" accept="image/*">
        </div>

        <div id="loader" class="hidden mt-20 text-center">
            <div class="inline-block animate-spin rounded-full h-14 w-14 border-4 border-blue-600 border-t-transparent mb-4"></div>
            <p class="text-lg font-bold text-slate-700">AI CLINICAL ENGINE ANALYZING...</p>
        </div>

        <div id="results" class="hidden mt-12 grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="bg-white p-5 rounded-[1.5rem] shadow-sm border border-slate-200">
                <img id="output-image" class="rounded-xl w-full h-auto" src="" alt="Prescription Image">
            </div>

            <div class="flex flex-col gap-6">
                <div id="ui-report-card" class="bg-white p-10 rounded-[1.5rem] shadow-xl border-t-[10px] border-blue-600">
                    <div id="analysis-content"></div>
                </div>

                <button id="download-pdf" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold hover:bg-black transition-all flex items-center justify-center gap-3 shadow-2xl">
                    📥 Download Professional PDF Report
                </button>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const results = document.getElementById('results');
        const loader = document.getElementById('loader');
        let currentAnalysisController = null;
        let isAnalyzing = false;
        let currentRequestId = null;

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('bg-blue-50', 'border-blue-400'); };
        dropZone.ondragleave = () => dropZone.classList.remove('bg-blue-50', 'border-blue-400');
        dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('bg-blue-50', 'border-blue-400'); handleFile(e.dataTransfer.files[0]); };

        // Cancel any ongoing analysis when clicking "New Analysis"
        document.querySelector('button[onclick="window.location.reload()"]').onclick = function(e) {
            e.preventDefault();
            cancelCurrentAnalysis();
            resetUI();
        };

        async function cancelCurrentAnalysis() {
            if (currentRequestId) {
                console.log('Cancelling analysis for request:', currentRequestId);
                try {
                    await fetch(`/cancel/${currentRequestId}`, { method: 'POST' });
                } catch (err) {
                    console.log('Cancel request failed:', err);
                }
            }
            if (currentAnalysisController) {
                currentAnalysisController.abort();
            }
            isAnalyzing = false;
            currentRequestId = null;
        }

        function resetUI() {
            loader.classList.add('hidden');
            results.classList.add('hidden');
            dropZone.classList.remove('hidden');
            document.getElementById('output-image').src = '';
            document.getElementById('analysis-content').innerHTML = '';
            isAnalyzing = false;
            currentRequestId = null;
        }

        async function handleFile(file) {
            if (!file || isAnalyzing) return;

            // Cancel any previous analysis
            await cancelCurrentAnalysis();

            isAnalyzing = true;

            // Show image immediately
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('output-image').src = e.target.result;
                results.classList.remove('hidden');
            };
            reader.readAsDataURL(file);

            // Start analysis
            const formData = new FormData();
            formData.append('file', file);

            loader.classList.remove('hidden');
            dropZone.classList.add('hidden');

            // Create new controller for this analysis
            currentAnalysisController = new AbortController();
            const signal = currentAnalysisController.signal;

            try {
                console.log('Starting analysis...');
                const response = await fetch('/analyze', { 
                    method: 'POST', 
                    body: formData,
                    signal: signal
                });
                const data = await response.json();
                
                if (data.error) {
                    if (data.error === "Request cancelled") {
                        console.log('Analysis was cancelled by user');
                        return;
                    }
                    throw new Error(data.error);
                }

                console.log('Analysis completed for request:', data.request_id);
                currentRequestId = data.request_id;
                
                // Update with processed image and analysis
                document.getElementById('output-image').src = `data:image/jpeg;base64,${data.image_data}`;
                document.getElementById('analysis-content').innerHTML = data.analysis_html;
            } catch (err) {
                if (err.name === 'AbortError') {
                    console.log('Analysis was cancelled by user');
                    return;
                }
                console.error('Analysis error:', err);
                alert("Error: " + err.message);
                resetUI();
            } finally {
                loader.classList.add('hidden');
                isAnalyzing = false;
            }
        }

        document.getElementById('download-pdf').onclick = function() {
            const analysisContent = document.getElementById('analysis-content');
            const imageData = document.getElementById('output-image').src;
            const dateStr = new Date().toLocaleDateString();

            const pdfHTML = `
                <html>
                <head>
                    <style>
                        body { font-family: Arial, sans-serif; padding: 20px; color: #1a1a1a; margin: 0; }
                        .header { border-bottom: 4px solid #1e3a8a; padding-bottom: 15px; margin-bottom: 20px; }
                        .header h1 { margin: 0 0 5px 0; color: #1e3a8a; font-size: 28px; font-weight: bold; }
                        .header p { margin: 0; font-size: 12px; color: #64748b; }
                        .content { font-size: 14px; line-height: 1.8; color: #1a1a1a; margin-bottom: 30px; }
                        .content h3 { color: #1e3a8a; font-size: 18px; margin-top: 15px; margin-bottom: 10px; border-left: 4px solid #2563eb; padding-left: 10px; font-weight: bold; }
                        .content p { margin-bottom: 10px; }
                        .content ul { list-style-type: disc; margin-left: 20px; margin-bottom: 10px; }
                        .content li { margin-bottom: 5px; }
                        .footer { margin-top: 40px; border-top: 1px solid #e2e8f0; padding-top: 15px; font-size: 11px; color: #64748b; }
                        .image-section { margin: 20px 0; }
                        .image-section img { max-width: 100%; height: auto; border: 1px solid #e0e0e0; border-radius: 5px; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <h1>Clinical Analysis Report</h1>
                        <p>Report Date: ${dateStr}</p>
                    </div>
                    <div class="image-section">
                        <img src="${imageData}" alt="Prescription">
                    </div>
                    <div class="content">
                        ${analysisContent.innerHTML}
                    </div>
                    <div class="footer">
                        <strong>⚠️ MEDICAL DISCLAIMER:</strong> This report is AI-generated for informational purposes only. Always consult a qualified healthcare professional for medical diagnosis and treatment.
                    </div>
                </body>
                </html>
            `;

            const opt = {
                margin: [10, 10, 10, 10],
                filename: `MedScan_Report_${dateStr.replace(/\//g, '-')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(pdfHTML).save();
        };
    </script>
</body>
</html>
